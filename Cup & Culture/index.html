<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solvyr Coffee - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <h1 class="logo">Solvyr Coffee</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Menu</a>
      <a href="#">About</a>
    </nav>
  </header>

  <main class="container">
    <section class="login-box">
      <h2>Welcome Back</h2>
      <p class="tagline">Brewing connections, one cup at a time</p>
      <form>
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
        <a href="#" class="forgot">Forgot your password?</a>
      </form>
    </section>

    <section class="image-box">
      <div class="overlay"></div>
      <img src="Image/Copilot_20260331_140705.png" alt="Solvyr Coffee Drink">
    </section>
  </main>
</body>
</html>
